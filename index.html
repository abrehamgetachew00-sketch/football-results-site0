<!DOCTYPE html>
<html>
<head>
  <title>Football Matches</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
    }
    .match {
      background: #1a2238;
      margin: 10px auto;
      padding: 15px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>

<body>

<h1>⚽ Football Matches</h1>

<div id="matches"></div>

<script>
const matches = [
  {
    home: "Arsenal",
    away: "Chelsea",
    score: "2 - 1"
  },
  {
    home: "Barcelona",
    away: "Real Madrid",
    score: "1 - 1"
  },
  {
    home: "Liverpool",
    away: "Man City",
    score: "3 - 2"
  }
];

const container = document.getElementById("matches");

matches.forEach(match => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerHTML = `
    <h3>${match.home} vs ${match.away}</h3>
    <p>${match.score}</p>
  `;
  container.appendChild(div);
});
</script>

</body>
</html>
